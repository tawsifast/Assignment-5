<body >


<!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_1.showModal()">open modal</button> -->

<dialog id="details_modal_1" class="modal">
        <div class="modal-box">
    <div id="details-container" class="space-y-6">

    </div>
    <div class="modal-action">
      <form method="dialog">
        <!-- if there is a button in form, it will close the modal -->
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>



<section>
    <nav>
        <div class="flex justify-between py-5">

            <div class="flex items-center gap-5">
                <img class="w-[50px]" src="./assets/github-logo.png" alt="">
                <h2 class="font-bold text-2xl">GitHub Issues Tracker</h2>
            </div>
        <div class="flex items-center gap-3">
    <label class="input w-[250px] ">
 
        <input id="input-search" type="search" required placeholder="Search" />
    </label>
        <button id="btn-search" class="btn btn-primary">New Issue</button>
            </div>
        </div>
    </nav>
</section>

<section id="btn-container" class="w-11/12 mx-auto shadow-sm p-5 mb-5 rounded-md ">
<div class="flex gap-4 items-center">
    <button onclick="filterIssues('all', id)" id="all-btn" class="btn btn-primary">All</button>
    <button onclick="filterIssues('open', id)" id="open-btn" class="btn btn-outline">Open</button>
    <button onclick="filterIssues('closed', id)" id="close-btn" class="btn btn-outline">Closed</button>    
</div>
</section>

<section id="issue-container" class="w-11/12 mx-auto shadow-sm p-5 mb-5 rounded-md">
    <div class="flex justify-between">
        <div class="flex justify-between items-center gap-3">
            <div>
                <img src="./assets/Aperture.png" alt="">
            </div>
            <div>
                <h2 class="font-bold text-xl"><span id="total">0</span> Issues</h2>
                <p>Track and manage your project issues</p>
            </div>
        </div>
        <div class="flex justify-between gap-5">  
            <p class="flex items-center gap-2"><span class="badge badge-success badge-xs"></span>Open</p>
            <p class="flex items-center gap-2"><span class="badge badge-error badge-xs"></span>Closed</p>
        </div>
    </div>
</section>

   <!-- Loading spinner  -->
        <div id="laodingSpinner" class="h-[60vh] flex hidden justify-center items-center">
                <span class="loading loading-dots loading-xl"></span>
        </div>

<section id="allIssueContainer">
<div id="card-container" class="w-11/12 mx-auto grid grid-cols-1 sm:grid-cols-4 gap-7 mb-10">
